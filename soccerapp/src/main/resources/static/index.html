<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    header {
      background: #16213e;
      border-bottom: 3px solid #2d6a4f;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.4rem;
      color: #52b788;
      letter-spacing: 1px;
    }

    header span { font-size: 1.6rem; }

    .columns {
      display: flex;
      gap: 0;
      height: calc(100vh - 60px);
    }

    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2d3561;
      overflow: hidden;
    }

    .column:last-child { border-right: none; }

    .column-header {
      background: #16213e;
      padding: 12px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #52b788;
      border-bottom: 1px solid #2d3561;
    }

    .column-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .column-body::-webkit-scrollbar { width: 4px; }
    .column-body::-webkit-scrollbar-track { background: #1a1a2e; }
    .column-body::-webkit-scrollbar-thumb { background: #2d6a4f; border-radius: 2px; }

    .card {
      background: #16213e;
      border: 1px solid #2d3561;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .card:hover {
      background: #1e3a5f;
      border-color: #52b788;
    }

    .card.active {
      background: #1b4332;
      border-color: #52b788;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #d8f3dc;
      margin-bottom: 4px;
    }

    .card-subtitle {
      font-size: 0.78rem;
      color: #74c69d;
    }

    .card-meta {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: #0d3b2e;
      color: #74c69d;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid #2d6a4f;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #444;
      font-size: 0.85rem;
      gap: 8px;
      padding: 24px;
      text-align: center;
    }

    .empty-state .icon { font-size: 2rem; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80px;
      color: #52b788;
      font-size: 0.85rem;
      gap: 8px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #2d6a4f;
      border-top-color: #52b788;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .jersey {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: #2d6a4f;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #d8f3dc;
      margin-right: 6px;
      flex-shrink: 0;
    }

    .player-name-row {
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>

<header>
  <span>⚽</span>
  <h1>Soccer App</h1>
</header>

<div class="columns">

  <!-- Leagues -->
  <div class="column">
    <div class="column-header">Leagues</div>
    <div class="column-body" id="leagues-list">
      <div class="loading"><div class="spinner"></div> Loading...</div>
    </div>
  </div>

  <!-- Clubs -->
  <div class="column">
    <div class="column-header">Clubs</div>
    <div class="column-body" id="clubs-list">
      <div class="empty-state">
        <div class="icon">🏟️</div>
        <div>Select a league to see its clubs</div>
      </div>
    </div>
  </div>

  <!-- Players -->
  <div class="column">
    <div class="column-header">Players</div>
    <div class="column-body" id="players-list">
      <div class="empty-state">
        <div class="icon">👟</div>
        <div>Select a club to see its players</div>
      </div>
    </div>
  </div>

</div>

<script>
  const BASE = '';  // same origin — served by Spring Boot at localhost:8080

  let selectedLeagueId = null;
  let selectedClubId   = null;

  // ── Helpers ────────────────────────────────────────────────────────────────

  function loading() {
    return `<div class="loading"><div class="spinner"></div> Loading...</div>`;
  }

  function orDash(val) {
    return val != null ? val : '—';
  }

  // ── Leagues ────────────────────────────────────────────────────────────────

  async function loadLeagues() {
    const el = document.getElementById('leagues-list');
    el.innerHTML = loading();

    const res  = await fetch(`${BASE}/api/leagues`);
    const data = await res.json();

    if (!data.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">🌍</div><div>No leagues found</div></div>`;
      return;
    }

    el.innerHTML = data.map(league => `
      <div class="card" id="league-${league.id}" onclick="selectLeague(${league.id})">
        <div class="card-title">${league.name}</div>
        <div class="card-subtitle">${orDash(league.country)}</div>
      </div>
    `).join('');
  }

  async function selectLeague(leagueId) {
    selectedLeagueId = leagueId;
    selectedClubId   = null;

    // highlight
    document.querySelectorAll('#leagues-list .card').forEach(c => c.classList.remove('active'));
    document.getElementById(`league-${leagueId}`)?.classList.add('active');

    // reset players
    document.getElementById('players-list').innerHTML = `
      <div class="empty-state"><div class="icon">👟</div><div>Select a club to see its players</div></div>
    `;

    await loadClubs(leagueId);
  }

  // ── Clubs ──────────────────────────────────────────────────────────────────

  async function loadClubs(leagueId) {
    const el = document.getElementById('clubs-list');
    el.innerHTML = loading();

    const res  = await fetch(`${BASE}/api/leagues/${leagueId}/clubs`);
    const data = await res.json();

    if (!data.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">🏟️</div><div>No clubs in this league</div></div>`;
      return;
    }

    el.innerHTML = data.map(club => `
      <div class="card" id="club-${club.id}" onclick="selectClub(${club.id})">
        <div class="card-title">${club.name}</div>
        <div class="card-meta">
          ${club.stadiumName   ? `<span class="tag">🏟 ${club.stadiumName}</span>` : ''}
          ${club.coachName     ? `<span class="tag">👔 ${club.coachName}</span>` : ''}
          ${club.foundedYear   ? `<span class="tag">📅 ${club.foundedYear}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  async function selectClub(clubId) {
    selectedClubId = clubId;

    // highlight
    document.querySelectorAll('#clubs-list .card').forEach(c => c.classList.remove('active'));
    document.getElementById(`club-${clubId}`)?.classList.add('active');

    await loadPlayers(selectedLeagueId, clubId);
  }

  // ── Players ────────────────────────────────────────────────────────────────

  async function loadPlayers(leagueId, clubId) {
    const el = document.getElementById('players-list');
    el.innerHTML = loading();

    const res  = await fetch(`${BASE}/api/leagues/${leagueId}/clubs/${clubId}/players`);
    const data = await res.json();

    if (!data.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">👟</div><div>No players in this club</div></div>`;
      return;
    }

    el.innerHTML = data.map(player => `
      <div class="card">
        <div class="player-name-row">
          <span class="jersey">${player.jerseyNumber != null ? player.jerseyNumber : '?'}</span>
          <div class="card-title">${player.name}</div>
        </div>
        <div class="card-meta">
          ${player.position    ? `<span class="tag">${player.position}</span>` : ''}
          ${player.nationality ? `<span class="tag">🌍 ${player.nationality}</span>` : ''}
          ${player.age         ? `<span class="tag">Age ${player.age}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  // ── Init ───────────────────────────────────────────────────────────────────

  loadLeagues();
</script>

</body>
</html>
